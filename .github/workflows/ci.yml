name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check server.js
        run: node --check server.js

      - name: Syntax check route files
        run: |
          for f in routes/*.js; do
            echo "Checking $f..."
            node --check "$f"
          done
